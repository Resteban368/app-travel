server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               application/wasm image/svg+xml;
    gzip_min_length 1024;

    # Archivos de entrada de Flutter — sin caché (no tienen hash en el nombre)
    location ~* (flutter_bootstrap\.js|main\.dart\.js|flutter\.js|flutter_service_worker\.js|manifest\.json)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires 0;
    }

    # Long-lived cache solo para assets con hash (wasm, fuentes, imágenes, css)
    location ~* \.(wasm|css|png|jpg|jpeg|gif|ico|svg|ttf|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html sin caché
    location = /agenteTravel/index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires 0;
    }

    # SPA fallback bajo /agenteTravel/
    location /agenteTravel/ {
        try_files $uri $uri/ /agenteTravel/index.html;
    }

    # Health check para plataforma de deploy (Coolify, etc.)
    location = /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Raíz: servir index.html directamente (evita 301 que rompe health checks)
    location = / {
        root /usr/share/nginx/html;
        try_files /agenteTravel/index.html =404;
    }
}
