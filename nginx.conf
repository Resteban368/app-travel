server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               application/wasm image/svg+xml;
    gzip_min_length 1024;

    # Long-lived cache para assets con hash
    location ~* \.(js|wasm|css|png|jpg|jpeg|gif|ico|svg|ttf|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html sin caché
    location = /agenteTravel/index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # SPA fallback bajo /agenteTravel/
    location /agenteTravel/ {
        try_files $uri $uri/ /agenteTravel/index.html;
    }

    # Redirigir raíz al subpath
    location = / {
        return 301 /agenteTravel/;
    }
}
