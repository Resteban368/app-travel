<!DOCTYPE html><html><head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Travel Tours Florencia - Panel Administrativo">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Travel Tours Florencia">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" href="favicon.png">

  <title>Travel Tours Florencia</title>
  <link rel="manifest" href="manifest.json">

  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: linear-gradient(135deg, #0D1B2A 0%, #12283D 50%, #1B4965 100%);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    #native-splash {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      animation: fadeInUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    #native-splash .title {
      font-size: 42px;
      font-weight: 800;
      color: #FFFFFF;
      letter-spacing: -1px;
      line-height: 1.1;
    }

    #native-splash .subtitle {
      font-size: 15px;
      font-weight: 600;
      color: #89D0E0;
      letter-spacing: 7px;
      margin-top: 2px;
    }

    #native-splash .divider {
      width: 60px;
      height: 1.5px;
      background: linear-gradient(to right, transparent, #62B6CB, transparent);
      margin: 20px 0 16px;
      animation: expandWidth 0.6s 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    #native-splash .panel-label {
      font-size: 13px;
      font-weight: 400;
      color: #B0BEC5;
      letter-spacing: 0.3px;
      animation: fadeIn 0.5s 0.6s ease both;
    }

    #native-splash .loader {
      margin-top: 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      animation: fadeIn 0.5s 0.7s ease both;
    }

    #native-splash .spinner {
      width: 36px;
      height: 36px;
      border: 2px solid rgba(98, 182, 203, 0.7);
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    #native-splash .loader-text {
      font-size: 12px;
      color: #B0BEC5;
      letter-spacing: 0.2px;
    }

    /* Decorative circles */
    .circle {
      position: fixed;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.06);
      pointer-events: none;
    }
    .circle-1 { width: 260px; height: 260px; top: -80px; right: -60px; border-color: rgba(255,255,255,0.06); }
    .circle-2 { width: 340px; height: 340px; bottom: -100px; left: -80px; border-color: rgba(255,255,255,0.05); }
    .circle-3 { width: 140px; height: 140px; top: 160px; left: -40px; border-color: rgba(255,255,255,0.04); }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes expandWidth {
      from { transform: scaleX(0); }
      to   { transform: scaleX(1); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="circle circle-1"></div>
  <div class="circle circle-2"></div>
  <div class="circle circle-3"></div>

  <div id="native-splash">
    <div class="title">Travel Tours</div>
    <div class="subtitle">FLORENCIA</div>
    <div class="divider"></div>
    <div class="panel-label">Panel Administrativo</div>
    <div class="loader">
      <div class="spinner"></div>
      <div class="loader-text">Iniciando sesión...</div>
    </div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      document.getElementById('native-splash')?.remove();
      document.querySelectorAll('.circle').forEach(el => el.remove());
      document.body.style.background = 'transparent';
    });
  </script>

  <script src="flutter_bootstrap.js" async=""></script>
</body></html>
